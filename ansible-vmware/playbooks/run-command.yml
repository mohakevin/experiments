---
- name: Run a command across VMware and private cloud hosts
  hosts: all
  gather_facts: false
  tasks:
    - name: Execute command on targets
      ansible.builtin.command: "{{ command | default('hostname') }}"
      register: command_result
      changed_when: false

    - name: Show command output
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ command_result.stdout }}"
